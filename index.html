<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Quần Áo Pro</title>

<style>
:root{
    --main-color:#ff5722;
    --bg-color:#f4f6f9;
    --text-color:#000;
}

body{
    margin:0;
    font-family:Arial;
    background:var(--bg-color);
    color:var(--text-color);
}

/* HEADER */
header{
    background:var(--main-color);
    color:white;
    padding:20px;
    text-align:center;
}

/* TOOLBAR */
.toolbar{
    padding:10px;
    background:#ddd;
    display:flex;
    gap:10px;
    justify-content:center;
}

.toolbar button, .toolbar input{
    padding:8px;
}

/* PRODUCTS */
.container{padding:20px}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.product{
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 10px #ccc;
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
}

button{
    background:var(--main-color);
    color:white;
    border:none;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}

/* CART */
.cart{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<header>SHOP QUẦN ÁO PRO</header>

<!-- TOOLBAR -->
<div class="toolbar">
    🎨 Chọn màu:
    <input type="color" onchange="changeColor(this.value)">

    <button onclick="darkMode()">🌙 Dark</button>
    <button onclick="lightMode()">☀ Light</button>
</div>

<div class="container">

<div class="products" id="productList"></div>

<div class="cart">
<h2>🛒 Giỏ hàng</h2>
<ul id="cartList"></ul>
<p><b>Tổng: <span id="total">0</span> đ</b></p>
</div>

</div>

<script>

let products=[
{name:"Áo thun",price:150000,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{name:"Quần jean",price:300000,img:"https://images.unsplash.com/photo-1514996937319-344454492b37"},
{name:"Áo hoodie",price:400000,img:"https://images.unsplash.com/photo-1520975928318-7b8f3e7d2a2e"}
];

let cart=[],total=0;

function renderProducts(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price}đ</p>
<button onclick="addToCart(${i})">Mua</button>
</div>`;
});
document.getElementById("productList").innerHTML=html;
}

function addToCart(i){
cart.push(products[i]);
total+=products[i].price;
renderCart();
}

function renderCart(){
let html="";
cart.forEach(item=>{
html+=`<li>${item.name} - ${item.price}đ</li>`;
});
document.getElementById("cartList").innerHTML=html;
document.getElementById("total").innerText=total;
}

/* 🎨 CHANGE COLOR */
function changeColor(color){
document.documentElement.style.setProperty('--main-color', color);
}

/* 🌙 DARK MODE */
function darkMode(){
document.documentElement.style.setProperty('--bg-color','#222');
document.documentElement.style.setProperty('--text-color','#fff');
}

/* ☀ LIGHT MODE */
function lightMode(){
document.documentElement.style.setProperty('--bg-color','#f4f6f9');
document.documentElement.style.setProperty('--text-color','#000');
}

renderProducts();

</script>

</body>
</html>
