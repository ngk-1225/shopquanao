<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Quần Áo</title>
<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}
header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}
nav {
    background: #333;
    padding: 10px;
    text-align: center;
}
nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
}
.container {
    padding: 20px;
}
.products {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}
.product {
    background: white;
    padding: 15px;
    width: 200px;
    border-radius: 10px;
    box-shadow: 0 0 5px #ccc;
}
.product img {
    width: 100%;
}
button {
    background: #ff5722;
    color: white;
    border: none;
    padding: 10px;
    cursor: pointer;
    margin-top: 10px;
}
.cart {
    background: white;
    padding: 15px;
    margin-top: 20px;
}
input {
    display: block;
    margin: 10px 0;
    padding: 8px;
    width: 100%;
}
</style>
</head>

<body>

<header>
    <h1>Shop Quần Áo Online</h1>
</header>

<nav>
    <a href="#">Trang chủ</a>
    <a href="#">Sản phẩm</a>
    <a href="#">Liên hệ</a>
</nav>

<div class="container">

<h2>Sản phẩm</h2>

<div class="products">

<div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Áo thun</h3>
    <p>150.000đ</p>
    <button onclick="addToCart('Áo thun',150000)">Mua</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Quần jean</h3>
    <p>300.000đ</p>
    <button onclick="addToCart('Quần jean',300000)">Mua</button>
</div>

<div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Áo hoodie</h3>
    <p>400.000đ</p>
    <button onclick="addToCart('Áo hoodie',400000)">Mua</button>
</div>

</div>

<div class="cart">
<h2>Giỏ hàng</h2>
<ul id="cartList"></ul>
<p><b>Tổng: <span id="total">0</span> đ</b></p>

<h3>Thông tin khách hàng</h3>
<input type="text" id="name" placeholder="Tên">
<input type="text" id="phone" placeholder="SĐT">
<input type="text" id="address" placeholder="Địa chỉ">

<button onclick="order()">Đặt hàng</button>
</div>

</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price) {
    cart.push({name, price});
    total += price;
    renderCart();
}

function renderCart() {
    let list = document.getElementById("cartList");
    list.innerHTML = "";
    cart.forEach(item => {
        let li = document.createElement("li");
        li.innerText = item.name + " - " + item.price + "đ";
        list.appendChild(li);
    });
    document.getElementById("total").innerText = total;
}

function order() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if(name === "" || phone === "" || address === "") {
        alert("Vui lòng nhập đầy đủ thông tin!");
        return;
    }

    if(cart.length === 0) {
        alert("Chưa có sản phẩm!");
        return;
    }

    alert("Đặt hàng thành công!\nCảm ơn " + name);
    cart = [];
    total = 0;
    renderCart();
}
</script>

</body>
</html>
