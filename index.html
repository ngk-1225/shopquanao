<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Quần Áo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#111;
    color:white;
    padding:20px;
    text-align:center;
    font-size:24px;
}

/* NAV */
nav{
    background:#222;
    padding:10px;
    text-align:center;
}
nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}
nav a:hover{
    color:#ff5722;
}

/* BANNER */
.banner{
    height:250px;
    background:url('https://images.unsplash.com/photo-1521336575822-6da63fb45455') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:30px;
    font-weight:bold;
}

/* CONTAINER */
.container{
    padding:30px;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.product{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    transition:0.3s;
}
.product:hover{
    transform:translateY(-5px);
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.product-content{
    padding:15px;
    text-align:center;
}

.product h3{
    margin-bottom:10px;
}

.product p{
    color:#ff5722;
    font-weight:bold;
}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    background:#ff5722;
    color:white;
    border-radius:5px;
    cursor:pointer;
    width:100%;
}
button:hover{
    background:#e64a19;
}

/* CART */
.cart{
    margin-top:40px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

/* FOOTER */
footer{
    margin-top:40px;
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>SHOP QUẦN ÁO</header>

<nav>
<a href="#">Trang chủ</a>
<a href="#">Sản phẩm</a>
<a href="#">Liên hệ</a>
</nav>

<div class="banner">
🔥 SALE 50% TOÀN BỘ SẢN PHẨM 🔥
</div>

<div class="container">

<h2>Sản phẩm nổi bật</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
<div class="product-content">
<h3>Áo thun</h3>
<p>150.000đ</p>
<button onclick="addToCart('Áo thun',150000)">Mua</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1514996937319-344454492b37">
<div class="product-content">
<h3>Quần jean</h3>
<p>300.000đ</p>
<button onclick="addToCart('Quần jean',300000)">Mua</button>
</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1520975928318-7b8f3e7d2a2e">
<div class="product-content">
<h3>Áo hoodie</h3>
<p>400.000đ</p>
<button onclick="addToCart('Áo hoodie',400000)">Mua</button>
</div>
</div>

</div>

<div class="cart">
<h2>🛒 Giỏ hàng</h2>
<ul id="cartList"></ul>
<p><b>Tổng: <span id="total">0</span> đ</b></p>

<h3>Thông tin khách hàng</h3>
<input type="text" id="name" placeholder="Tên">
<input type="text" id="phone" placeholder="SĐT">
<input type="text" id="address" placeholder="Địa chỉ">

<button onclick="order()">Đặt hàng</button>
</div>

</div>

<footer>
© 2026 Shop Quần Áo | Sinh viên thực hiện
</footer>

<script>
let cart = [];
let total = 0;

function addToCart(name, price){
    cart.push({name, price});
    total += price;
    renderCart();
}

function renderCart(){
    let list = document.getElementById("cartList");
    list.innerHTML="";
    cart.forEach(item=>{
        let li=document.createElement("li");
        li.innerText=item.name+" - "+item.price+"đ";
        list.appendChild(li);
    });
    document.getElementById("total").innerText=total;
}

function order(){
    let name=document.getElementById("name").value;
    let phone=document.getElementById("phone").value;
    let address=document.getElementById("address").value;

    if(!name || !phone || !address){
        alert("Nhập đủ thông tin!");
        return;
    }

    if(cart.length===0){
        alert("Chưa có sản phẩm!");
        return;
    }

    alert("Đặt hàng thành công! Cảm ơn "+name);
    cart=[];
    total=0;
    renderCart();
}
</script>

</body>
</html>
