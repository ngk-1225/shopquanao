<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Shop Quần Áo Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#f4f6f9;margin:0}
header{background:#111;color:#fff;padding:20px;text-align:center;font-size:24px}
nav{background:#222;padding:10px;text-align:center}
nav a{color:white;margin:0 15px;text-decoration:none}
.container{padding:20px}

.search{
margin-bottom:20px;
display:flex;
gap:10px;
}
.search input,.search select{
padding:10px;
width:100%;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
text-align:center;
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

button{
background:#ff5722;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
width:100%;
}

.cart{
background:white;
padding:20px;
margin-top:30px;
border-radius:10px;
}

</style>
</head>

<body>

<header>SHOP QUẦN ÁO PRO</header>

<div class="container">

<div class="search">
<input type="text" id="search" placeholder="Tìm sản phẩm..." onkeyup="renderProducts()">
<select id="filter" onchange="renderProducts()">
<option value="all">Tất cả</option>
<option value="200000">Dưới 200k</option>
<option value="400000">Dưới 400k</option>
</select>
</div>

<div class="products" id="productList"></div>

<div class="cart">
<h2>🛒 Giỏ hàng (<span id="count">0</span>)</h2>
<ul id="cartList"></ul>
<p><b>Tổng: <span id="total">0</span> đ</b></p>
<button onclick="clearCart()">Xoá tất cả</button>

<h3>Thông tin khách hàng</h3>
<input id="name" placeholder="Tên">
<input id="phone" placeholder="SĐT">
<input id="address" placeholder="Địa chỉ">
<button onclick="order()">Đặt hàng</button>
</div>

</div>

<script>

let products = [
{name:"Áo thun basic",price:150000,img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{name:"Quần jean",price:300000,img:"https://images.unsplash.com/photo-1514996937319-344454492b37"},
{name:"Áo hoodie",price:400000,img:"https://images.unsplash.com/photo-1520975928318-7b8f3e7d2a2e"},
{name:"Áo sơ mi",price:250000,img:"https://images.unsplash.com/photo-1521336575822-6da63fb45455"},
{name:"Quần short",price:180000,img:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"},
{name:"Áo khoác",price:500000,img:"https://images.unsplash.com/photo-1520975693411-001d8c4c0f6d"}
];

let cart=[];
let total=0;

function renderProducts(){
let keyword=document.getElementById("search").value.toLowerCase();
let filter=document.getElementById("filter").value;

let html="";

products.forEach((p,i)=>{
if(p.name.toLowerCase().includes(keyword)){
if(filter=="all" || p.price<=filter){
html+=`
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price}đ</p>
<button onclick="addToCart(${i})">Mua</button>
</div>`;
}
}
});

document.getElementById("productList").innerHTML=html;
}

function addToCart(i){
cart.push(products[i]);
total+=products[i].price;
renderCart();
}

function renderCart(){
let html="";
cart.forEach((item,index)=>{
html+=`<li>${item.name} - ${item.price}đ 
<button onclick="removeItem(${index})">X</button></li>`;
});
document.getElementById("cartList").innerHTML=html;
document.getElementById("total").innerText=total;
document.getElementById("count").innerText=cart.length;
}

function removeItem(i){
total-=cart[i].price;
cart.splice(i,1);
renderCart();
}

function clearCart(){
cart=[];
total=0;
renderCart();
}

function order(){
let name=document.getElementById("name").value;
if(!name){alert("Nhập tên!");return;}
if(cart.length==0){alert("Chưa có sản phẩm");return;}
alert("Đặt hàng thành công!");
cart=[]; total=0; renderCart();
}

renderProducts();

</script>

</body>
</html>
