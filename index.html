<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thu Trang Smart Home | Gia Dụng Cao Cấp</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --gold: #c9a84c;
            --bg: #0a0a0a;
            --card: #141414;
            --text: #e8e0d0;
            --dim: #8a8070;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Be Vietnam Pro', sans-serif; 
            background: var(--bg); 
            color: var(--text);
            line-height: 1.6;
        }

        /* Header */
        header {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(201, 168, 76, 0.2);
        }

        .logo { text-decoration: none; }
        .logo h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 24px; }
        .logo p { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); }

        .cart-btn {
            background: var(--gold);
            color: #000;
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Main Content */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--card);
            color: var(--dim);
            border: 1px solid #333;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* Product Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            transition: var(--transition);
        }

        .card:hover { transform: translateY(-10px); border-color: var(--gold); }

        .img-box {
            height: 250px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Đảm bảo ảnh luôn lấp đầy khung */
        }

        .info { padding: 20px; }
        .cat { color: var(--gold); font-size: 12px; text-transform: uppercase; }
        .name { font-size: 18px; margin: 10px 0; height: 50px; overflow: hidden; }
        .price { font-size: 20px; font-weight: 700; color: var(--gold); }

        .add-btn {
            width: 100%;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .add-btn:hover { background: var(--gold); color: #000; }

        /* Cart Drawer */
        .drawer {
            position: fixed;
            right: -100%;
            top: 0;
            width: 400px;
            height: 100%;
            background: #1a1a1a;
            z-index: 2000;
            padding: 30px;
            transition: 0.4s;
            box-shadow: -5px 0 20px rgba(0,0,0,0.5);
        }

        .drawer.open { right: 0; }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            z-index: 1500;
        }

        footer { text-align: center; padding: 50px; color: var(--dim); border-top: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">
            <h1>THU TRANG</h1>
            <p>Smart Home Solution</p>
        </a>
        <button class="cart-btn" onclick="toggleCart()">
            <i class="fas fa-shopping-cart"></i>
            Giỏ hàng (<span id="count">0</span>)
        </button>
    </header>

    <div class="container">
        <div class="filter-bar">
            <button class="filter-btn active" onclick="filter('all', this)">Tất cả</button>
            <button class="filter-btn" onclick="filter('bep', this)">Nhà bếp</button>
            <button class="filter-btn" onclick="filter('dien', this)">Điện gia dụng</button>
            <button class="filter-btn" onclick="filter('vesinh', this)">Vệ sinh</button>
        </div>

        <div class="grid" id="productGrid">
            <!-- Sản phẩm tự động load ở đây -->
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="drawer" id="drawer">
        <h2 style="margin-bottom: 20px; border-bottom: 1px solid var(--gold); padding-bottom: 10px;">Giỏ hàng của bạn</h2>
        <div id="cartItems"></div>
        <div style="margin-top: 20px;">
            <h3 id="totalPrice">Tổng: 0đ</h3>
            <button class="add-btn" style="background: var(--gold); color: #000;" onclick="alert('Cảm ơn bạn đã đặt hàng!')">THANH TOÁN NGAY</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Thu Trang Smart Home. Hotline: 0777 105 408</p>
    </footer>

    <script>
        // Dữ liệu sản phẩm dùng ảnh từ Unsplash (Đã test hiển thị)
        const products = [
            { id: 1, cat: 'bep', name: 'Nồi chiên không dầu Gaabor 4.5L', price: 890000, img: 'https://images.unsplash.com/photo-1626197031507-c17099753214?auto=format&fit=crop&w=500&q=80' },
            { id: 2, cat: 'bep', name: 'Máy pha cà phê Capsule Xiaomi', price: 1250000, img: 'https://images.unsplash.com/photo-1517668808822-9ebb02f2a0e6?auto=format&fit=crop&w=500&q=80' },
            { id: 3, cat: 'vesinh', name: 'Nước giặt thảo mộc Animo 3.2L', price: 121000, img: 'https://images.unsplash.com/photo-1610557892470-55d9e80c0bce?auto=format&fit=crop&w=500&q=80' },
            { id: 4, cat: 'bep', name: 'Máy xay sinh tố đa năng Bear', price: 450000, img: 'https://images.unsplash.com/photo-1570197788417-0e82375c9371?auto=format&fit=crop&w=500&q=80' },
            { id: 5, cat: 'dien', name: 'Ấm đun siêu tốc Inox 304', price: 320000, img: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=500&q=80' },
            { id: 6, cat: 'vesinh', name: 'Chổi lau nhà tự vắt Spin Mop', price: 280000, img: 'https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=500&q=80' },
            { id: 7, cat: 'dien', name: 'Máy hút bụi mini cầm tay 2026', price: 750000, img: 'https://images.unsplash.com/photo-1558317374-067fb5f30001?auto=format&fit=crop&w=500&q=80' },
            { id: 8, cat: 'bep', name: 'Lò vi sóng Sharp 20L cao cấp', price: 1850000, img: 'https://images.unsplash.com/photo-1574269909862-7e1d70bb8078?auto=format&fit=crop&w=500&q=80' }
        ];

        let cart = [];

        function render(data) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.map(p => `
                <div class="card">
                    <div class="img-box">
                        <img src="${p.img}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300x250?text=Sản+Phẩm'">
                    </div>
                    <div class="info">
                        <p class="cat">${p.cat}</p>
                        <h3 class="name">${p.name}</h3>
                        <p class="price">${p.price.toLocaleString()}đ</p>
                        <button class="add-btn" onclick="addToCart(${p.id})">Thêm vào giỏ</button>
                    </div>
                </div>
            `).join('');
        }

        function filter(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if(cat === 'all') render(products);
            else render(products.filter(p => p.cat === cat));
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            updateCart();
            alert('Đã thêm: ' + item.name);
        }

        function updateCart() {
            document.getElementById('count').innerText = cart.length;
            const cartItems = document.getElementById('cartItems');
            cartItems.innerHTML = cart.map((item, index) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <span>${item.name}</span>
                    <b>${item.price.toLocaleString()}đ</b>
                </div>
            `).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('totalPrice').innerText = 'Tổng: ' + total.toLocaleString() + 'đ';
        }

        function toggleCart() {
            document.getElementById('drawer').classList.toggle('open');
            document.getElementById('overlay').style.display = 
                document.getElementById('overlay').style.display === 'block' ? 'none' : 'block';
        }

        // Khởi chạy lần đầu
        render(products);
    </script>
</body>
</html>
